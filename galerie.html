<div class="page-header"><div class="page-header-badge">Texas Life RP — 1885</div><h1 class="page-title">Galerie Photos</h1><p class="page-subtitle">Les plus beaux panoramas du territoire</p></div>

<div class="modal-overlay" id="modal"><span class="modal-close" id="modalClose">&times;</span><img class="modal-img" id="modalImg" src="" alt=""></div>
<script>
const modal=document.getElementById('modal'),modalImg=document.getElementById('modalImg'),close=document.getElementById('modalClose');
document.querySelectorAll('.gallery-item img').forEach(img=>{img.addEventListener('click',()=>{modalImg.src=img.src;modal.classList.add('open');});});
close.onclick=()=>modal.classList.remove('open');
modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')modal.classList.remove('open');});
</script>
